<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AdministrativeToolBox - Browser</title>
    <link rel="stylesheet" href="./vendor/pyscript/core.css" />
    <script type="module" src="./vendor/pyscript/core.js"></script>
    <style>
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #0e1a2b;
        --muted: #4a5c76;
        --primary: #0a6cff;
        --border: #d7dfeb;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top left, #e8efff 0%, var(--bg) 40%, #f8fbff 100%);
        font-family: "Segoe UI", "Noto Sans", sans-serif;
        color: var(--text);
      }

      .wrap {
        max-width: 900px;
        margin: 24px auto;
        padding: 0 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 8px 30px rgba(16, 32, 67, 0.06);
      }

      h1 {
        margin: 0 0 8px 0;
        font-size: 1.5rem;
      }

      .muted {
        color: var(--muted);
        margin: 0 0 16px 0;
      }

      .row {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 10px;
        align-items: center;
        margin: 10px 0;
      }

      input, select, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 8px;
        border: 1px solid var(--border);
        padding: 10px;
        font-size: 14px;
      }

      button {
        cursor: pointer;
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
        font-weight: 600;
      }

      button:hover {
        filter: brightness(0.96);
      }

      .section {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px dashed var(--border);
      }

      .hidden {
        display: none;
      }

      #status {
        margin-top: 12px;
        white-space: pre-wrap;
        background: #f5f9ff;
        border: 1px solid #dbe7ff;
        border-radius: 8px;
        padding: 10px;
        min-height: 22px;
      }

      .tip {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>AdministrativeToolBox no Browser</h1>
        <p class="muted">Escolha a função, envie o arquivo e baixe o resultado sem instalar executável.</p>

        <div class="row">
          <label for="mode">Função</label>
          <select id="mode">
            <option value="siscac">SISCAC -> CSV</option>
            <option value="reinf">EFD-Reinf -> ZIP</option>
          </select>
        </div>

        <section id="siscac-section" class="section">
          <div class="row">
            <label for="siscac-file">Relatório SISCAC (PDF)</label>
            <input id="siscac-file" type="file" accept=".pdf,application/pdf" />
          </div>
          <div class="row">
            <label for="siscac-filename">Nome do CSV</label>
            <input id="siscac-filename" type="text" value="pagamentos.csv" />
          </div>
          <div class="row">
            <span></span>
            <button id="run-siscac" type="button">Extrair CSV</button>
          </div>
        </section>

        <section id="reinf-section" class="section hidden">
          <div class="row">
            <label for="reinf-file">Arquivo de controle (XLSX ou CSV)</label>
            <input id="reinf-file" type="file" accept=".xlsx,.csv,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
          </div>
          <div class="row">
            <label for="reinf-cnpj">CNPJ contribuinte</label>
            <input id="reinf-cnpj" type="text" placeholder="12345678000190" />
          </div>
          <div class="row">
            <label for="reinf-razao">Razão social</label>
            <input id="reinf-razao" type="text" placeholder="Empresa Exemplo Ltda" />
          </div>
          <div class="row">
            <label for="reinf-mes">Mês de apuração</label>
            <input id="reinf-mes" type="number" min="1" max="12" value="1" />
          </div>
          <div class="row">
            <label for="reinf-ano">Ano de apuração</label>
            <input id="reinf-ano" type="number" min="2000" max="2100" value="2024" />
          </div>
          <div class="row">
            <label for="reinf-filename">Nome do ZIP</label>
            <input id="reinf-filename" type="text" value="efdreinf_xmls.zip" />
          </div>
          <div class="row">
            <span></span>
            <button id="run-reinf" type="button">Gerar ZIP de XMLs</button>
          </div>
        </section>

        <div id="status">Inicializando PyScript...</div>
        <p class="tip">A primeira carga pode levar alguns segundos.</p>
      </div>
    </div>

    <script type="py" src="./app.py" config="./pyscript.toml"></script>
  </body>
</html>
