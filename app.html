<!DOCTYPE html>
<html lang="pt-BR">

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .tabs { display: flex; gap: 0; background: #002244; padding: 0 2rem; }
    .tab-btn {
      padding: 0.6rem 1.4rem;
      border: none; background: transparent; color: #aac4e0;
      cursor: pointer; font-size: 0.9rem; border-bottom: 3px solid transparent;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #4db6ff; }
    .panel { display: none; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    .panel.active { display: block; }
    .card { background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 1rem; }

    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.25rem; margin-top: 0.75rem; }
    label:first-child { margin-top: 0; }
    input[type="text"], input[type="number"], input[type="file"] {
      width: 100%; padding: 0.45rem 0.6rem; border: 1px solid #ccc;
      border-radius: 4px; font-size: 0.9rem;
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    button.run-btn {
      margin-top: 1.2rem; width: 100%; padding: 0.65rem;
      background: #0055aa; color: #fff; border: none;
      border-radius: 5px; font-size: 0.95rem; cursor: pointer;
    }
    button.run-btn:hover { background: #0044cc; }
    button.run-btn:disabled { background: #aaa; cursor: default; }
    .status-box {
      margin-top: 0.8rem; padding: 0.75rem; border-radius: 5px;
      font-size: 0.85rem; white-space: pre-wrap; display: none;
    }
    .status-box.info  { background: #e8f0ff; color: #003; display: block; }
    .status-box.ok    { background: #d4edda; color: #155724; display: block; }
    .status-box.error { background: #f8d7da; color: #721c24; display: block; }
    a.download-link {

      text-decoration: none; font-size: 0.9rem;
    }
    a.download-link:hover { background: #146c43; }
    footer { text-align: center; color: #888; font-size: 0.75rem; padding: 2rem; }
  </style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// UI helpers
// ═══════════════════════════════════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
}

function setStatus(prefix, type, msg) {
  const el = document.getElementById(prefix + '-status');
  el.className = 'status-box ' + type;
  el.textContent = msg;
}

function triggerDownload(filename, blob) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 2000);
}

// Dependencias externas (SheetJS, JSZip e pdf.js) com fallback de caminhos.
const LIB_FILES = {
  xlsx: 'xlsx.full.min.js',
  jszip: 'jszip.min.js',
  pdf: 'pdf.min.js',
  pdfWorker: 'pdf.worker.min.js',
};
const LIB_BASE_CANDIDATES = ['./vendor/js', 'vendor/js', '../vendor/js', '../../vendor/js'];
let activeLibBase = './vendor/js';

function getMissingLibraries() {
  const missing = [];
  if (typeof XLSX === 'undefined') missing.push('SheetJS (XLSX)');
  if (typeof JSZip === 'undefined') missing.push('JSZip');
  if (typeof pdfjsLib === 'undefined') missing.push('pdf.js');
  return missing;
}

function setPdfWorker(basePath) {
  if (typeof pdfjsLib !== 'undefined' && pdfjsLib.GlobalWorkerOptions) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = `${basePath}/${LIB_FILES.pdfWorker}`;
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.async = false;
    script.onload = () => resolve(src);
    script.onerror = () => reject(new Error(`Falha ao carregar: ${src}`));
    document.head.appendChild(script);
  });
}

async function tryLoadLibrariesFrom(basePath) {
  const pendingLoads = [];

  if (typeof XLSX === 'undefined') pendingLoads.push(loadScript(`${basePath}/${LIB_FILES.xlsx}`));
  if (typeof JSZip === 'undefined') pendingLoads.push(loadScript(`${basePath}/${LIB_FILES.jszip}`));
  if (typeof pdfjsLib === 'undefined') pendingLoads.push(loadScript(`${basePath}/${LIB_FILES.pdf}`));

  if (pendingLoads.length) {
    await Promise.allSettled(pendingLoads);
  }

  if (!getMissingLibraries().length) {
    activeLibBase = basePath;
    setPdfWorker(basePath);
    return true;
  }

  return false;
}

async function ensureLibrariesLoaded() {
  if (!getMissingLibraries().length) {
    setPdfWorker(activeLibBase);
    return { ok: true, basePath: activeLibBase, attempted: [] };
  }

  const attempted = [];
  for (const basePath of LIB_BASE_CANDIDATES) {
    attempted.push(basePath);
    const ok = await tryLoadLibrariesFrom(basePath);
    if (ok) return { ok: true, basePath, attempted };
  }

  return { ok: false, missing: getMissingLibraries(), attempted };
}

// ═══════════════════════════════════════════════════════════════════════════
// Utilitários gerais (portados de efdreinf_xml.py e siscac_payments.py)
// ═══════════════════════════════════════════════════════════════════════════
function digitsOnly(s) {
  return String(s || '').replace(/\D/g, '');
}

function fmtDec(val) {
  const n = parseFloat(val) || 0;
  return n.toFixed(2);
}

function parseDecimal(val) {
  if (val === null || val === undefined || val === '') return 0;
  let s = String(val).trim();
  // Remove simbolos de moeda e caracteres nao numericos comuns em planilhas.
  s = s
    .replace(/R\$/gi, '')
    .replace(/'/g, '')
    .replace(/\s/g, '')
    .replace(/[^0-9,.-]/g, '');
  if (!s) return 0;
  // Formato BR: 1.234,56
  if (/^\d{1,3}(\.\d{3})+(,\d+)?$/.test(s)) {
    s = s.replace(/\./g, '').replace(',', '.');
  } else {
    s = s.replace(',', '.');
  }
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function parseDate(val) {
  if (!val) return null;
  if (val instanceof Date) {
    const y = val.getFullYear();
    const m = String(val.getMonth() + 1).padStart(2, '0');
    const d = String(val.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  const s = String(val).trim();
  // dd/mm/yyyy
  const m1 = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m1) return `${m1[3]}-${m1[2]}-${m1[1]}`;
  // yyyy-mm-dd
  const m2 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m2) return s;
  return null;
}

// Normaliza header: minúsculas, sem acentos, sem espaços duplos
function normalizeHeader(s) {
  s = String(s || '').trim().toLowerCase();
  s = s.normalize('NFKD').replace(/[\u0300-\u036f]/g, '');
  s = s.replace(/\s+/g, ' ');
  return s;
}

function cleanText(val) {
  return String(val || '')
    .replace(/[\u200B-\u200D\uFEFF\u2060]/g, '')
    .trim();
}

function parseDateBrOrIso(val) {
  if (!val) return null;
  const s = String(val).trim();
  const br = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (br) return `${br[3]}-${br[2]}-${br[1]}`;
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (iso) return s;
  return null;
}

function toBrDate(isoDate) {
  if (!isoDate) return 'N/A';
  const m = String(isoDate).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return 'N/A';
  return `${m[3]}/${m[2]}/${m[1]}`;
}

function toIsoToday() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// ═══════════════════════════════════════════════════════════════════════════
// EFD-Reinf: mapeamento de colunas (portado de _COL_ALIASES)
// ═══════════════════════════════════════════════════════════════════════════
const COL_ALIASES = {
  cnpj_emitente:       ['cnpj emitente','cnpj_emitente','cnpj prestador','cnpj do prestador','cnpj'],
  nome_emitente:       ['nome emitente','nome_emitente','razao social','razão social','prestador','abreviatura'],
  numero_nf:           ['numero nf','número nf','numero_nf','nf','número da nf','nota fiscal'],
  serie_nf:            ['série nf','serie nf','serie_nf','série da nf'],
  data_emissao:        ['data emissão','data emissao','data_emissao','emissão','emissao','data pagto'],
  valor_bruto:         ['valor bruto','valor_bruto','vr bruto','bruto','valor tributável','valor tributavel'],
  codigo_imposto:      ['código imposto','codigo imposto','codigo_imposto','código de receita','código',
                        'cod. receita (siscac)','cod receita (siscac)','cod receita','cód. receita (siscac)'],
  serie_reinf:         ['série reinf','serie reinf','serie_reinf'],
  natureza_rendimento: ['natureza rendimento','natureza_rendimento','natureza','nat rendimento',
                        'natureza rendimento (cód. ecac)','natureza rendimento (cod. ecac)',
                        'natureza rendimento (cod ecac)','natureza rendimento cod ecac'],
  base_calculo:        ['base de cálculo','base de calculo','base_calculo','rendimento tributável',
                        'rendimento tributavel','base calculo','valor tributável','valor tributavel'],
  valor_retido:        ['valor retido','valor_retido','vr retido','imposto retido',
                        'retencao individual','retenção individual'],
  retencao_agregada:   ['retencao agregada','retenção agregada'],
  cnpj_beneficiario:   ['cnpj beneficiário','cnpj beneficiario','cnpj_beneficiario','cpf/cnpj beneficiário'],
  nome_beneficiario:   ['nome beneficiário','nome beneficiario','nome_beneficiario','beneficiário','beneficiario'],
  tipo_beneficiario:   ['tipo beneficiário','tipo beneficiario','tipo_beneficiario','pf/pj','tipo'],
};

function resolveColumns(headerRow) {
  const normalized = headerRow.map(normalizeHeader);
  const mapping = {};
  for (const [canonical, aliases] of Object.entries(COL_ALIASES)) {
    for (const alias of aliases) {
      const aliasNorm = normalizeHeader(alias);
      const idx = normalized.indexOf(aliasNorm);
      if (idx >= 0) { mapping[canonical] = idx; break; }
    }
  }
  return mapping;
}

function findHeaderRowIndex(rows) {
  const maxScan = Math.min(rows.length, 60);
  let bestIdx = -1;
  let bestScore = 0;

  for (let i = 0; i < maxScan; i++) {
    const row = rows[i].map(v => v === null ? '' : String(v));
    const colMap = resolveColumns(row);
    const score = Object.keys(colMap).length;

    if (score > bestScore) {
      bestScore = score;
      bestIdx = i;
    }

    const hasCnpj = 'cnpj_emitente' in colMap;
    const hasValue =
      ('valor_retido' in colMap) ||
      ('retencao_agregada' in colMap) ||
      ('valor_bruto' in colMap) ||
      ('base_calculo' in colMap);

    if (hasCnpj && hasValue && score >= 3) return i;
  }

  return bestScore >= 3 ? bestIdx : -1;
}

function naturezaValida(s) {
  return /^\d{5}$/.test(String(s || '').trim());
}

function inferSerieReinf(natureza) {
  return naturezaValida(natureza) ? 'S4000' : 'S2000';
}

function rowToRecord(row, rowNum, colMap, hasSerieColumn) {
  const get = key => {
    const idx = colMap[key];
    return (idx !== undefined && idx < row.length) ? row[idx] : null;
  };

  const natureza = cleanText(get('natureza_rendimento'));
  const codigoImposto = cleanText(get('codigo_imposto'));
  const serieRaw = cleanText(get('serie_reinf')).toUpperCase();

  let serieReinf;
  if (hasSerieColumn) {
    if (serieRaw !== 'S2000' && serieRaw !== 'S4000') return null;
    serieReinf = serieRaw;
  } else {
    serieReinf = inferSerieReinf(natureza);
  }

  const numeroNf = cleanText(get('numero_nf')) || `ROW${rowNum}`;

  let valorBruto = parseDecimal(get('valor_bruto') ?? get('base_calculo'));
  let baseCalculo = parseDecimal(get('base_calculo') ?? get('valor_bruto'));
  let valorRetido = parseDecimal(get('valor_retido'));
  if (valorRetido <= 0) {
    valorRetido = parseDecimal(get('retencao_agregada') || get('valor_retido'));
  }

  const cnpjEmitente = digitsOnly(get('cnpj_emitente'));
  const nomeEmitente = cleanText(get('nome_emitente'));

  // Ignora linhas de rodape/ruido sem dados essenciais.
  if (!cnpjEmitente && !nomeEmitente && !natureza && valorBruto <= 0 && baseCalculo <= 0 && valorRetido <= 0) {
    return null;
  }

  // Linhas com codigo '-' representam itens sem retencao (somente controle interno).
  if (valorRetido <= 0 && codigoImposto === '-') {
    return null;
  }

  return {
    _source_row:         rowNum,
    cnpj_emitente:       cnpjEmitente,
    nome_emitente:       nomeEmitente,
    numero_nf:           numeroNf,
    serie_nf:            cleanText(get('serie_nf')),
    data_emissao:        parseDate(get('data_emissao')),
    valor_bruto:         valorBruto,
    codigo_imposto:      codigoImposto,
    serie_reinf:         serieReinf,
    natureza_rendimento: natureza,
    base_calculo:        baseCalculo,
    valor_retido:        valorRetido,
    cnpj_beneficiario:   digitsOnly(get('cnpj_beneficiario')),
    nome_beneficiario:   cleanText(get('nome_beneficiario')),
    tipo_beneficiario:   cleanText(get('tipo_beneficiario') || 'PJ').toUpperCase(),
  };
}

// Lê XLSX usando SheetJS; retorna array de records
function readXlsxSheet(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  if (!rows.length) return [];

  const headerIndex = findHeaderRowIndex(rows);
  if (headerIndex < 0) {
    throw new Error('Nao foi possivel identificar o cabecalho da planilha.');
  }

  const header = rows[headerIndex].map(h => h === null ? '' : String(h));
  const colMap = resolveColumns(header);
  const hasSerieColumn = 'serie_reinf' in colMap;

  const records = [];
  for (let i = headerIndex + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row.some(v => v !== null && String(v).trim() !== '')) continue;
    const rec = rowToRecord(row, i + 1, colMap, hasSerieColumn);
    if (rec) records.push(rec);
  }
  return records;
}

// Lê CSV (texto) e retorna records
function readCsvText(text) {
  // Detecta separador
  const sample = text.slice(0, 2048);
  let sep = ',';
  for (const c of [';', '\t', '|']) {
    if ((sample.match(new RegExp('\\' + c, 'g')) || []).length >
        (sample.match(/,/g) || []).length) { sep = c; break; }
  }

  const lines = text.replace(/\r\n?/g, '\n').split('\n');
  const parseLine = line => {
    const result = [];
    let cur = '';
    let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === sep && !inQ) {
        result.push(cleanText(cur)); cur = '';
      } else {
        cur += ch;
      }
    }
    result.push(cleanText(cur));
    return result;
  };

  const rows = lines.map(parseLine).filter(r => r.some(v => v !== ''));
  if (!rows.length) return [];

  const headerIndex = findHeaderRowIndex(rows);
  if (headerIndex < 0) {
    throw new Error('Nao foi possivel identificar o cabecalho do CSV.');
  }

  const colMap = resolveColumns(rows[headerIndex]);
  const hasSerieColumn = 'serie_reinf' in colMap;

  const records = [];
  for (let i = headerIndex + 1; i < rows.length; i++) {
    const rec = rowToRecord(rows[i], i + 1, colMap, hasSerieColumn);
    if (rec) records.push(rec);
  }
  return records;
}

function readControlSheet(arrayBuffer, filename) {
  if (filename.toLowerCase().endsWith('.csv')) {
    // Tenta UTF-8 e faz fallback para Latin-1/Windows-1252 quando houver caracteres invalidos.
    let text = new TextDecoder('utf-8').decode(arrayBuffer).replace(/^\uFEFF/, '');
    if (text.includes('\uFFFD')) {
      text = new TextDecoder('latin1').decode(arrayBuffer).replace(/^\uFEFF/, '');
    }
    return readCsvText(text);
  }
  return readXlsxSheet(arrayBuffer);
}

// ═══════════════════════════════════════════════════════════════════════════
// Validação
// ═══════════════════════════════════════════════════════════════════════════
function validateRecords(records) {
  const issues = [];
  records.forEach((rec, i) => {
    const row = rec._source_row || (i + 2);
    if (!rec.cnpj_emitente) issues.push(`Linha ${row}: CNPJ Emitente ausente.`);
    if (rec.serie_reinf === 'S4000' && !naturezaValida(rec.natureza_rendimento))
      issues.push(`Linha ${row}: Natureza Rendimento inválida (${rec.natureza_rendimento}) para S4000.`);
    if (rec.valor_retido <= 0)
      issues.push(`Linha ${row}: Valor Retido deve ser positivo.`);
  });
  return issues;
}

// ═══════════════════════════════════════════════════════════════════════════
// Construtores XML
// ═══════════════════════════════════════════════════════════════════════════
function prettifyXml(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'application/xml');
  const xs = new XMLSerializer();
  // Fallback: devolve sem pretty-print em ambientes sem XSLT
  // Implementação manual simples de indentação
  let out = '<?xml version="1.0" encoding="UTF-8"?>\n';
  function walk(node, depth) {
    const indent = '  '.repeat(depth);
    if (node.nodeType === Node.TEXT_NODE) {
      const t = node.textContent.trim();
      if (t) out += indent + t + '\n';
      return;
    }
    if (node.nodeType !== Node.ELEMENT_NODE) return;
    const tag = node.tagName;
    const attrs = Array.from(node.attributes).map(a => ` ${a.name}="${a.value}"`).join('');
    const children = Array.from(node.childNodes).filter(
      c => c.nodeType === Node.ELEMENT_NODE || (c.nodeType === Node.TEXT_NODE && c.textContent.trim())
    );
    if (children.length === 0) {
      out += `${indent}<${tag}${attrs} />\n`;
    } else if (children.length === 1 && children[0].nodeType === Node.TEXT_NODE) {
      out += `${indent}<${tag}${attrs}>${children[0].textContent.trim()}</${tag}>\n`;
    } else {
      out += `${indent}<${tag}${attrs}>\n`;
      children.forEach(c => walk(c, depth + 1));
      out += `${indent}</${tag}>\n`;
    }
  }
  walk(doc.documentElement, 0);
  return out;
}

function buildXml(tagName, ns, builderFn) {
  const doc = document.implementation.createDocument(ns, tagName, null);
  const root = doc.documentElement;
  builderFn(doc, root);
  const xs = new XMLSerializer();
  return prettifyXml(xs.serializeToString(root));
}

function addEl(doc, parent, tag, text) {
  const el = doc.createElement(tag);
  if (text !== undefined && text !== null) el.textContent = String(text);
  parent.appendChild(el);
  return el;
}

function buildR1000(cnpj, razaoSocial) {
  return buildXml('Reinf', 'http://www.reinf.esocial.gov.br/schemas/evtInfoContri/v2_01_01', (doc, root) => {
    const evt = addEl(doc, root, 'evtInfoContri');
    const ide = addEl(doc, evt, 'ideContri');
    addEl(doc, ide, 'tpInsc', '1');
    addEl(doc, ide, 'nrInsc', cnpj);
    addEl(doc, ide, 'nmRazao', razaoSocial);
  });
}

function buildR2010(cnpjContrib, cnpjPrestador, records, month, year) {
  return buildXml('Reinf', 'http://www.reinf.esocial.gov.br/schemas/evtServTom/v2_01_01', (doc, root) => {
    const evt = addEl(doc, root, 'evtServTom');
    const ideEvt = addEl(doc, evt, 'ideEvento');
    addEl(doc, ideEvt, 'indRetif', '1');
    addEl(doc, ideEvt, 'perApur', `${year}-${String(month).padStart(2,'0')}`);
    addEl(doc, ideEvt, 'tpAmb', '2');
    addEl(doc, ideEvt, 'procEmi', '1');
    addEl(doc, ideEvt, 'verProc', '1.0');

    const ideContrib = addEl(doc, evt, 'ideContrib');
    addEl(doc, ideContrib, 'tpInsc', '1');
    addEl(doc, ideContrib, 'nrInsc', cnpjContrib);

    const ideEstab = addEl(doc, evt, 'ideEstab');
    addEl(doc, ideEstab, 'tpInsc', '1');
    addEl(doc, ideEstab, 'nrInsc', cnpjContrib);

    const detEvt = addEl(doc, ideEstab, 'detEvt');

    // Group by NF
    const nfGroups = {};
    for (const rec of records) {
      const key = `${rec.numero_nf}||${rec.data_emissao}||${rec.valor_bruto}`;
      if (!nfGroups[key]) nfGroups[key] = [];
      nfGroups[key].push(rec);
    }

    for (const [, nfRecs] of Object.entries(nfGroups)) {
      const nfSeq = addEl(doc, detEvt, 'nfSeq');
      addEl(doc, nfSeq, 'nrNF', nfRecs[0].numero_nf);
      addEl(doc, nfSeq, 'dtEmiNF', nfRecs[0].data_emissao || '');
      addEl(doc, nfSeq, 'vrBruto', fmtDec(nfRecs[0].valor_bruto));
      const detRet = addEl(doc, nfSeq, 'detRet');
      const baseTotal = nfRecs.reduce((s, r) => s + r.base_calculo, 0);
      const retTotal  = nfRecs.reduce((s, r) => s + r.valor_retido, 0);
      addEl(doc, detRet, 'vrBaseRet', fmtDec(baseTotal));
      addEl(doc, detRet, 'vrRet', fmtDec(retTotal));
    }
  });
}

function buildR4020(cnpjContrib, cnpjPrestador, records, month, year) {
  return buildXml('Reinf', 'http://www.reinf.esocial.gov.br/schemas/evtRetPJ/v2_01_01', (doc, root) => {
    const evt = addEl(doc, root, 'evtRetPJ');
    const ideEvt = addEl(doc, evt, 'ideEvento');
    addEl(doc, ideEvt, 'indRetif', '1');
    addEl(doc, ideEvt, 'perApur', `${year}-${String(month).padStart(2,'0')}`);
    addEl(doc, ideEvt, 'tpAmb', '2');
    addEl(doc, ideEvt, 'procEmi', '1');
    addEl(doc, ideEvt, 'verProc', '1.0');

    const ideContrib = addEl(doc, evt, 'ideContrib');
    addEl(doc, ideContrib, 'tpInsc', '1');
    addEl(doc, ideContrib, 'nrInsc', cnpjContrib);

    const idePJ = addEl(doc, evt, 'idePJ');
    addEl(doc, idePJ, 'cnpjPrestador', cnpjPrestador);

    // Group by natureza
    const groups = {};
    for (const rec of records) {
      if (!groups[rec.natureza_rendimento]) groups[rec.natureza_rendimento] = [];
      groups[rec.natureza_rendimento].push(rec);
    }

    for (const [natureza, natRecs] of Object.entries(groups)) {
      const detPag = addEl(doc, idePJ, 'detPag');
      addEl(doc, detPag, 'natRend', natureza);
      addEl(doc, detPag, 'vrBaseRet', fmtDec(natRecs.reduce((s, r) => s + r.base_calculo, 0)));
      addEl(doc, detPag, 'vrRet',     fmtDec(natRecs.reduce((s, r) => s + r.valor_retido, 0)));
    }
  });
}

function buildFechamento(evento, perApur) {
  return buildXml('Reinf', '', (doc, root) => {
    const evt = addEl(doc, root, evento);
    const ideEvt = addEl(doc, evt, 'ideEvento');
    addEl(doc, ideEvt, 'perApur', perApur);
  });
}

const DIARIAS_TEMPLATE_HEADER = [
  'NOME_BENEFICIARIO',
  'DATA_SOLICITACAO',

  'DATA_RETORNO',
  'CIDADE_ORIGEM',

  'TIPO_SOLICITACAO',
  'CARGO_BENEFICIARIO',
  'NOME_PROPONENTE',
  'CARGO_PROPONENTE',
  'TRANSPORTE',
];
function downloadDiariasTemplate() {

  }
  
  // Criar array de arrays para SheetJS

  ws['!cols'] = DIARIAS_TEMPLATE_HEADER.map(() => ({ wch: 20 }));
  
  // Formatar header com fundo azul e fonte branca em negrito
  for (let i = 0; i < DIARIAS_TEMPLATE_HEADER.length; i++) {

  XLSX.utils.book_append_sheet(wb, ws, 'Diarias');
  XLSX.writeFile(wb, 'template_diarias.xlsx');
}

function parseCsvSimple(text) {
  const sample = text.slice(0, 2048);
  let sep = ',';
  for (const c of [';', '\t', '|']) {
    if ((sample.match(new RegExp('\\' + c, 'g')) || []).length >
        (sample.match(/,/g) || []).length) {
      sep = c;
      break;
    }
  }

  const lines = text.replace(/\r\n?/g, '\n').split('\n');
  const parseLine = line => {
    const out = [];
    let cur = '';
    let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === sep && !inQ) {
        out.push(cleanText(cur));
        cur = '';
      } else {
        cur += ch;
      }
    }
    out.push(cleanText(cur));
    return out;
  };

  return lines.map(parseLine).filter(r => r.some(v => v !== ''));
}

function parseDiariasCsv(text) {
  const rows = parseCsvSimple(text);
  if (!rows.length) return { items: [], errors: ['CSV vazio.'] };

  const header = rows[0].map(h => normalizeHeader(h).toUpperCase());
  const idx = {};
  header.forEach((h, i) => { idx[h] = i; });

  const required = [
    'NOME_BENEFICIARIO',
    'DATA_SAIDA',
    'DATA_RETORNO',
    'CIDADE_ORIGEM',
    'CIDADE_DESTINO',
    'OBJETIVO',
  ];
  const missing = required.filter(c => idx[c] === undefined);
  if (missing.length) {
    return {
      items: [],
      errors: [
        'Cabecalho invalido. Colunas obrigatorias ausentes: ' + missing.join(', '),
      ],
    };
  }

  const pick = (row, col) => {
    const i = idx[col];
    return i === undefined || i >= row.length ? '' : cleanText(row[i]);
  };

  const errors = [];
  const items = [];

  for (let i = 1; i < rows.length; i++) {
    const lineNum = i + 1;
    const row = rows[i];

    const normalized = normalizeDiariaScdItem({
      lineNum,
      nome_beneficiario: pick(row, 'NOME_BENEFICIARIO'),
      data_solicitacao: pick(row, 'DATA_SOLICITACAO'),
      data_saida: pick(row, 'DATA_SAIDA'),
      data_retorno: pick(row, 'DATA_RETORNO'),
      cidade_origem: pick(row, 'CIDADE_ORIGEM'),
      cidade_destino: pick(row, 'CIDADE_DESTINO'),
      objetivo: pick(row, 'OBJETIVO'),
      tipo_solicitacao: pick(row, 'TIPO_SOLICITACAO'),
      cargo_beneficiario: pick(row, 'CARGO_BENEFICIARIO'),
      nome_proponente: pick(row, 'NOME_PROPONENTE'),
      cargo_proponente: pick(row, 'CARGO_PROPONENTE'),
      transporte: pick(row, 'TRANSPORTE'),
    });    if (!normalized.ok) {
      errors.push(`Linha ${lineNum}: ${normalized.error}`);
      continue;
    }
    items.push(normalized.item);
  }

  return { items, errors };
}

function normalizeDiariaScdItem(raw) {
  const nome = cleanText(raw.nome_beneficiario);
  const dataSaida = parseDateBrOrIso(raw.data_saida);
  const dataRetorno = parseDateBrOrIso(raw.data_retorno);
  const dataSolic = parseDateBrOrIso(raw.data_solicitacao) || toIsoToday();

  if (!nome) return { ok: false, error: 'NOME_BENEFICIARIO vazio.' };
  if (!dataSaida || !dataRetorno) {
    return { ok: false, error: 'DATA_SAIDA/DATA_RETORNO invalidas. Use DD/MM/AAAA ou AAAA-MM-DD.' };
  }
  if (dataRetorno < dataSaida) {
    return { ok: false, error: 'DATA_RETORNO nao pode ser anterior a DATA_SAIDA.' };
  }

  return {
    ok: true,
    item: {
      lineNum: raw.lineNum || 1,
      nome_beneficiario: nome,
      data_solicitacao: dataSolic,
      data_saida: dataSaida,
      data_retorno: dataRetorno,
      cidade_origem: cleanText(raw.cidade_origem) || 'N/A',
      cidade_destino: cleanText(raw.cidade_destino) || 'N/A',
      objetivo: cleanText(raw.objetivo) || 'N/A',
      tipo_solicitacao: cleanText(raw.tipo_solicitacao) || 'INICIAL',
      cargo_beneficiario: cleanText(raw.cargo_beneficiario) || 'N/A',
      nome_proponente: cleanText(raw.nome_proponente) || 'N/A',
      cargo_proponente: cleanText(raw.cargo_proponente) || 'Cargo nao informado',
      transporte: cleanText(raw.transporte) || 'N/A',
    },
  };
}

function pdfEscape(text) {
  const s = String(text || '')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^\x20-\x7E]/g, ' ');
  return s.replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
}

function estimateTextWidth(text, fontSize) {
  return String(text || '').length * (fontSize * 0.52);
}

function wrapTextForPdf(text, maxWidth, fontSize) {
  const words = String(text || '').split(/\s+/).filter(Boolean);
  const lines = [];
  let cur = '';

  for (const word of words) {
    const test = cur ? `${cur} ${word}` : word;
    if (estimateTextWidth(test, fontSize) <= maxWidth) {
      cur = test;
    } else {
      if (cur) lines.push(cur);
      cur = word;
    }
  }
  if (cur) lines.push(cur);
  return lines.length ? lines : ['N/A'];
}

function buildSimplePdf(contentOps) {
  const stream = contentOps.join('\n');
  const streamLength = new TextEncoder().encode(stream).length;

  const objects = [
    '<< /Type /Catalog /Pages 2 0 R >>',
    '<< /Type /Pages /Kids [3 0 R] /Count 1 >>',
    '<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Contents 4 0 R /Resources << /Font << /F1 5 0 R /F2 6 0 R >> >> >>',
    `<< /Length ${streamLength} >>\nstream\n${stream}\nendstream`,
    '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>',
    '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>',
  ];

  let pdf = '%PDF-1.4\n';
  const offsets = [0];

  for (let i = 0; i < objects.length; i++) {
    offsets.push(new TextEncoder().encode(pdf).length);
    pdf += `${i + 1} 0 obj\n${objects[i]}\nendobj\n`;
  }

  const xrefPos = new TextEncoder().encode(pdf).length;
  pdf += `xref\n0 ${objects.length + 1}\n`;
  pdf += '0000000000 65535 f \n';
  for (let i = 1; i < offsets.length; i++) {
    pdf += `${String(offsets[i]).padStart(10, '0')} 00000 n \n`;
  }
  pdf += `trailer\n<< /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xrefPos}\n%%EOF`;

  return new Uint8Array(new TextEncoder().encode(pdf));
}

function buildScdPdfBytes(item) {
  const marginLeft = 70;
  const marginRight = 70;
  const pageWidth = 595;
  const textWidth = pageWidth - marginLeft - marginRight;
  const sigHalf = 130;
  const sigY = 200;
  const ops = [];

  const centerText = (text, y, font = 'F1', size = 11) => {
    const w = estimateTextWidth(text, size);
    const x = Math.max(20, (pageWidth - w) / 2);
    ops.push(`BT /${font} ${size} Tf 1 0 0 1 ${x.toFixed(2)} ${y.toFixed(2)} Tm (${pdfEscape(text)}) Tj ET`);
  };

  const leftText = (text, x, y, font = 'F1', size = 11) => {
    ops.push(`BT /${font} ${size} Tf 1 0 0 1 ${x.toFixed(2)} ${y.toFixed(2)} Tm (${pdfEscape(text)}) Tj ET`);
  };

  const drawLine = (x1, y1, x2, y2) => {
    ops.push(`${x1.toFixed(2)} ${y1.toFixed(2)} m ${x2.toFixed(2)} ${y2.toFixed(2)} l S`);
  };

  centerText('SOLICITACAO DE CONCESSAO DE DIARIAS - SCD', 620, 'F2', 14);

  let y = 550;
  const fields = [
    `Data da Solicitacao: ${toBrDate(item.data_solicitacao)}`,
    `Beneficiario: ${item.nome_beneficiario || 'N/A'}`,
    `Cargo do Beneficiario: ${item.cargo_beneficiario || 'N/A'}`,
    `Periodo: ${toBrDate(item.data_saida)} a ${toBrDate(item.data_retorno)}`,
    `Trajeto: ${item.cidade_origem || 'N/A'} para ${item.cidade_destino || 'N/A'}`,
    `Transporte: ${item.transporte || 'N/A'}`,
  ];
  for (const f of fields) {
    leftText(f, marginLeft, y, 'F1', 11);
    y -= 20;
  }

  const objectiveTitleY = y - 8;
  leftText('Objetivo:', marginLeft, objectiveTitleY, 'F2', 11);
  const objectiveLines = wrapTextForPdf(item.objetivo || 'N/A', textWidth, 11);
  let objY = objectiveTitleY - 20;
  
  // Minimum space before signature block (60px gap + 60px for signature block itself)
  const minSigY = 120;
  const maxObjectiveY = minSigY + 60;
  let displayedLines = 0;
  
  for (const line of objectiveLines) {
    if (objY - 14 >= maxObjectiveY) {
      leftText(line, marginLeft, objY, 'F1', 11);
      objY -= 14;
      displayedLines++;
    } else {
      break;
    }
  }

  const sigY_dynamic = Math.max(minSigY, objY - 60);
  const sigRightX = pageWidth - marginRight - sigHalf;
  drawLine(sigRightX - sigHalf, sigY_dynamic, sigRightX + sigHalf, sigY_dynamic);
  centerText('Proponente', sigY_dynamic - 16, 'F1', 10);
  centerText(item.nome_proponente || 'N/A', sigY_dynamic - 32, 'F1', 10);
  centerText(item.cargo_proponente || 'Cargo nao informado', sigY_dynamic - 46, 'F1', 10);

  return buildSimplePdf(ops);
}

function sanitizeFilename(s) {
  return String(s || '')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-zA-Z0-9._-]+/g, '_')
    .replace(/_+/g, '_')
    .replace(/^_+|_+$/g, '') || 'arquivo';
}

// ═══════════════════════════════════════════════════════════════════════════
// Orquestrador EFD-Reinf
// ═══════════════════════════════════════════════════════════════════════════
function gerarXmlsReinf(arrayBuffer, filename, cnpjContrib, razaoSocial, month, year) {
  const records = readControlSheet(arrayBuffer, filename);
  if (!records.length) throw new Error('Nenhum registro S2000/S4000 encontrado na planilha.');

  const issues = validateRecords(records);
  if (issues.length) throw new Error('Inconsistências:\n' + issues.join('\n'));

  const cnpj = digitsOnly(cnpjContrib);
  const perApur = `${year}-${String(month).padStart(2,'0')}`;

  const inssByPrestador = {};
  const federalByPrestador = {};
  for (const rec of records) {
    if (rec.serie_reinf === 'S2000') {
      if (!inssByPrestador[rec.cnpj_emitente]) inssByPrestador[rec.cnpj_emitente] = [];
      inssByPrestador[rec.cnpj_emitente].push(rec);
    } else {
      if (!federalByPrestador[rec.cnpj_emitente]) federalByPrestador[rec.cnpj_emitente] = [];
      federalByPrestador[rec.cnpj_emitente].push(rec);
    }
  }

  const xmls = {};
  xmls['R-1000_Cadastro_Empresa.xml'] = buildR1000(cnpj, razaoSocial);

  for (const [prest, recs] of Object.entries(inssByPrestador)) {
    xmls[`INSS_R2010/R2010_CNPJ_${prest}_${year}${String(month).padStart(2,'0')}.xml`] =
      buildR2010(cnpj, prest, recs, month, year);
  }
  if (Object.keys(inssByPrestador).length)
    xmls['INSS_R2010/R2099_Fechamento.xml'] = buildFechamento('evtFechaEvPer', perApur);

  for (const [prest, recs] of Object.entries(federalByPrestador)) {
    xmls[`Federais_R4020/R4020_CNPJ_${prest}_${year}${String(month).padStart(2,'0')}.xml`] =
      buildR4020(cnpj, prest, recs, month, year);
  }
  if (Object.keys(federalByPrestador).length)
    xmls['Federais_R4020/R4099_Fechamento.xml'] = buildFechamento('evtFechaEvPer', perApur);

  return xmls;
}

// SISCAC: extração via pdf.js
// ═══════════════════════════════════════════════════════════════════════════

function extractLinesFromPdfTextItems(items) {
  const lines = [];
  let current = '';
  let prevY = null;

  for (const item of items) {
    const str = (item.str || '').trim();
    const y = Array.isArray(item.transform) ? item.transform[5] : null;
    const changedLine = prevY !== null && y !== null && Math.abs(y - prevY) > 2;

    if (changedLine && current) {
      lines.push(current);
      current = '';
    }

    if (str) {
      current = current ? current + ' ' + str : str;
    }

    if (item.hasEOL && current) {
      lines.push(current);
      current = '';
    }

    if (y !== null) prevY = y;
  }

  if (current) lines.push(current);
  return lines;
}

async function parseSiscacPdf(arrayBuffer) {
  if (typeof pdfjsLib === 'undefined') {
    throw new Error('pdf.js não carregou. Verifique se os arquivos locais em ./vendor/js existem.');
  }

  // Define explicitamente o worker local para evitar resolução incorreta no file://.
  setPdfWorker(activeLibBase);

  let pdf;
  try {
    pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  } catch (err) {
    const msg = String((err && err.message) || err || '');
    if (/fake worker|pdf\.worker(\.min)?\.js|cannot load script/i.test(msg)) {
      throw new Error(
        'Nao foi possivel carregar o worker do PDF.js. ' +
        'Confirme que o arquivo ./vendor/js/pdf.worker.min.js existe.'
      );
    }
    throw err;
  }
  const payments = {};
  let currentComprovante = null;
  let currentData = null;

  // Padrões (portados de siscac_payments.py)
  const rePay = /^(20\d{2}PG\d{5})\s+(.*?)\s+(?:20\d{2}NE\d{5}\s+)?\d{5}\/\d{4}\s+(\d{2}\/\d{2}\/\d{4})\s+([\d.,]+)$/;
  const rePayLegacy = /^(20\d{2}PG\d{5})\s+(.*?)\s+20\d{2}NE\d{5}.*?([\d.,]+)$/;
  const reData = /\bdata\b[:\s]*([\d]{2}\/[\d]{2}\/[\d]{4})/i;
  const reComp = /N[o°º]\s*do\s*Comprovante[:\s]*([\d.\-]+)/i;

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const lines = extractLinesFromPdfTextItems(content.items || []);

    for (const line of lines) {
      const mComp = reComp.exec(line);
      if (mComp) currentComprovante = mComp[1].replace(/\./g, '');

      const mData = reData.exec(line);
      if (mData) currentData = mData[1];

      let mPay = rePay.exec(line);
      const hasDateInLine = !!mPay;
      if (!mPay) mPay = rePayLegacy.exec(line);
      if (mPay) {
        const pg = mPay[1];
        const credor = mPay[2].trim();
        const paymentDate = hasDateInLine ? mPay[3] : null;
        const valorStr = (hasDateInLine ? mPay[4] : mPay[3]).replace(/\./g, '').replace(',', '.');
        const valor = parseFloat(valorStr) || 0;
        if (paymentDate) currentData = paymentDate;

        if (payments[pg]) {
          payments[pg].valor_total += valor;
          if (!payments[pg].data_contabilizado && paymentDate) {
            payments[pg].data_contabilizado = paymentDate;
          }
        } else {
          payments[pg] = {
            siscac_pg: pg,
            credor,
            valor_total: valor,
            data_contabilizado: paymentDate || currentData,
            comprovante: currentComprovante,
          };
        }
      }
    }
  }
  return Object.values(payments);
}

function paymentsToCsv(payments) {
  const fields = ['credor','siscac_pg','valor_total','data_contabilizado','comprovante'];
  const header = fields.join(',');
  const rows = payments.map(p =>
    fields.map(f => {
      let v = p[f] !== null && p[f] !== undefined ? String(p[f]) : '';
      if (f === 'valor_total') {
        const n = parseFloat(p[f]);
        if (!isNaN(n)) v = n.toFixed(2).replace('.', ',');
      }
      return v.includes(',') || v.includes('"') ? `"${v.replace(/"/g,'""')}"` : v;
    }).join(',')
  );
  return '\uFEFF' + [header, ...rows].join('\n');
}

async function runSiscac() {
  const fileInput = document.getElementById('siscac-file');
  const btn = document.getElementById('siscac-btn');
  const dlDiv = document.getElementById('siscac-download');
  dlDiv.innerHTML = '';

  if (!fileInput.files.length) {
    setStatus('siscac', 'error', 'Selecione um arquivo PDF.');
    return;
  }

  btn.disabled = true;
  setStatus('siscac', 'info', 'Processando PDF...');

  try {
    const depCheck = await ensureLibrariesLoaded();
    if (!depCheck.ok) {
      throw new Error(
        'Dependências ausentes: ' + depCheck.missing.join(', ') +
        '. Caminhos testados: ' + depCheck.attempted.join(', ')
      );
    }

    const file = fileInput.files[0];
    const buf = await file.arrayBuffer();
    const payments = await parseSiscacPdf(buf);

    if (!payments.length) {
      setStatus('siscac', 'error',
        'Nenhum pagamento encontrado no PDF.\n\n' +
        'Nota: o parsing do SISCAC foi implementado com base nos padrões ' +
        'conhecidos do relatório. Se o formato do seu PDF for diferente, ' +
        'entre em contato para ajustar os padrões de extração.');
      return;
    }

    const csvText = paymentsToCsv(payments);
    const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8' });
    const name = file.name.replace(/\.pdf$/i, '') + '_pagamentos.csv';

    setStatus('siscac', 'ok', `✓ ${payments.length} pagamento(s) extraído(s).`);

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.className = 'download-link';
    a.textContent = `⬇ Baixar ${name}`;
    dlDiv.appendChild(a);
    a.click();
  } catch (e) {
    setStatus('siscac', 'error', 'Erro: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function runReinf() {
  const fileInput = document.getElementById('reinf-file');
  const cnpj = document.getElementById('reinf-cnpj').value.trim();
  const razao = document.getElementById('reinf-razao').value.trim();
  const mes = parseInt(document.getElementById('reinf-mes').value, 10);
  const ano = parseInt(document.getElementById('reinf-ano').value, 10);
  const btn = document.getElementById('reinf-btn');
  const dlDiv = document.getElementById('reinf-download');
  dlDiv.innerHTML = '';

  if (!fileInput.files.length) { setStatus('reinf','error','Selecione um arquivo XLSX ou CSV.'); return; }
  if (!cnpj) { setStatus('reinf','error','Informe o CNPJ do Contribuinte.'); return; }
  if (!razao) { setStatus('reinf','error','Informe a Razão Social.'); return; }
  if (!mes || mes < 1 || mes > 12) { setStatus('reinf','error','Mês inválido (1–12).'); return; }
  if (!ano || ano < 2020) { setStatus('reinf','error','Ano inválido.'); return; }

  btn.disabled = true;
  setStatus('reinf','info','Processando planilha...');

  try {
    const depCheck = await ensureLibrariesLoaded();
    if (!depCheck.ok) {
      throw new Error(
        'Dependências ausentes: ' + depCheck.missing.join(', ') +
        '. Caminhos testados: ' + depCheck.attempted.join(', ')
      );
    }

    const file = fileInput.files[0];
    const buf = await file.arrayBuffer();
    const xmls = gerarXmlsReinf(buf, file.name, cnpj, razao, mes, ano);

    const zip = new JSZip();
    for (const [path, content] of Object.entries(xmls)) {
      zip.file(path, content);
    }
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const zipName = `EFD_Reinf_${ano}${String(mes).padStart(2,'0')}.zip`;

    setStatus('reinf', 'ok', `✓ ${Object.keys(xmls).length} arquivo(s) XML gerado(s).`);

    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = zipName;
    a.className = 'download-link';
    a.textContent = `⬇ Baixar ${zipName}`;
    dlDiv.appendChild(a);
    a.click();
  } catch (e) {
    setStatus('reinf','error','Erro: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function runDiariasScd() {
  const fileInput = document.getElementById('diarias-file');
  const nomeProponenteDefault = cleanText(document.getElementById('diarias-proponente').value);
  const cargoProponenteDefault = cleanText(document.getElementById('diarias-cargo-proponente').value);
  const transporteDefault = cleanText(document.getElementById('diarias-transporte').value);
  const btn = document.getElementById('diarias-btn');
  const dlDiv = document.getElementById('diarias-download');
  dlDiv.innerHTML = '';

  if (!fileInput.files.length) {
    setStatus('diarias', 'error', 'Selecione um arquivo CSV ou XLSX.');
    return;
  }

  btn.disabled = true;
  setStatus('diarias', 'info', 'Lendo arquivo e montando PDFs SCD...');

  try {
    const depCheck = await ensureLibrariesLoaded();
    if (!depCheck.ok) {
      throw new Error(
        'Dependências ausentes: ' + depCheck.missing.join(', ') +
        '. Caminhos testados: ' + depCheck.attempted.join(', ')
      );
    }

    const file = fileInput.files[0];
    const buf = await file.arrayBuffer();
    const filename = file.name.toLowerCase();
    
    let parsed;
    
    // Detectar tipo de arquivo e processar
    if (filename.endsWith('.xlsx') || filename.endsWith('.xls')) {
      // Processar como XLSX
      const workbook = XLSX.read(buf, { type: 'array' });
      const worksheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
      
      if (!rows.length) {
        throw new Error('Arquivo XLSX vazio.');
      }
      
      // Converter de XLSX para formato CSV para reutilizar o parser
      const csvLines = rows.map(row => row.map(cell => {
        const str = String(cell || '').trim();
        return str.includes(',') || str.includes('"') ? `"${str.replace(/"/g, '""')}"` : str;
      }).join(','));
      const csvText = csvLines.join('\n');
      parsed = parseDiariasCsv(csvText);
    } else {
      // Processar como CSV
      let text = new TextDecoder('utf-8').decode(buf).replace(/^\uFEFF/, '');
      if (text.includes('\uFFFD')) {
        text = new TextDecoder('latin1').decode(buf).replace(/^\uFEFF/, '');
      }
      parsed = parseDiariasCsv(text);
    }
    if (!parsed.items.length) {
      throw new Error('Nenhuma linha valida para gerar SCD.\n' + parsed.errors.join('\n'));
    }

    const items = parsed.items.map(it => ({
      ...it,
      nome_proponente: it.nome_proponente === 'N/A' && nomeProponenteDefault ? nomeProponenteDefault : it.nome_proponente,
      cargo_proponente: it.cargo_proponente === 'Cargo nao informado' && cargoProponenteDefault ? cargoProponenteDefault : it.cargo_proponente,
      transporte: it.transporte === 'N/A' && transporteDefault ? transporteDefault : it.transporte,
    }));

    const zip = new JSZip();
    items.forEach((item, i) => {
      const pdfBytes = buildScdPdfBytes(item);
      const nome = sanitizeFilename(item.nome_beneficiario || `linha_${item.lineNum}`);
      const data = (item.data_saida || '').replace(/-/g, '');
      const fileName = `SCD_${String(i + 1).padStart(3, '0')}_${nome}_${data || 'sem_data'}.pdf`;
      zip.file(fileName, pdfBytes);
    });

    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const outName = file.name.replace(/\.csv$/i, '') + '_SCD_PDFs.zip';

    const msgs = [];
    msgs.push(`✓ ${items.length} SCD(s) gerada(s) em PDF.`);
    if (parsed.errors.length) {
      msgs.push('');
      msgs.push(`Linhas ignoradas por erro: ${parsed.errors.length}`);
      msgs.push(...parsed.errors.slice(0, 10));
      if (parsed.errors.length > 10) msgs.push('...');
    }
    setStatus('diarias', 'ok', msgs.join('\n'));

    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = outName;
    a.className = 'download-link';
    a.textContent = `⬇ Baixar ${outName}`;
    dlDiv.appendChild(a);
    a.click();
  } catch (e) {
    setStatus('diarias', 'error', 'Erro: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
